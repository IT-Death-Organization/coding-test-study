name: Move LeetCode Solutions

on:
  push:
    branches:
      - main
    paths:
      - "[0-9][0-9][0-9][0-9]-*/**"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: move-leetcode-solutions
  cancel-in-progress: false

jobs:
  move-files:
    # Action이 만든 커밋에는 실행하지 않음
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move and push solutions
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          # LeetHub가 동시에 main을 갱신할 수 있으므로 최대 5번 재시도
          for attempt in 1 2 3 4 5; do
            echo "Attempt: $attempt"

            # 매번 가장 최신 main에서 작업을 다시 시작
            git fetch origin main
            git reset --hard origin/main

            mkdir -p LeetCode

            moved=false

            for directory in [0-9][0-9][0-9][0-9]-*; do
              if [[ ! -d "$directory" ]]; then
                continue
              fi

              echo "Moving $directory"

              destination="LeetCode/$directory"

              mkdir -p "$destination"
              cp -a "$directory/." "$destination/"
              rm -rf "$directory"

              moved=true
            done

            if [[ "$moved" == false ]]; then
              echo "No root-level LeetCode directories found."
              exit 0
            fi

            git add -A

            if git diff --cached --quiet; then
              echo "No changes to commit."
              exit 0
            fi

            git commit \
              -m "chore: move LeetCode solutions to LeetCode directory"

            if git push origin HEAD:main; then
              echo "Successfully moved LeetCode solutions."
              exit 0
            fi

            echo "Remote main changed. Retrying from latest main."
            sleep 2
          done

          echo "Failed to push after 5 attempts."
          exit 1
